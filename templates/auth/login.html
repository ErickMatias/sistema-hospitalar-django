{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow border-0">

            <div class="card-body p-5">

                <h2 class="text-center mb-4">

                    Login

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Usuário

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Senha

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                        >

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-primary">

                            Entrar

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
