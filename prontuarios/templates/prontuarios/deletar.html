{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="text-danger mb-4">
            Confirmar Exclusão
        </h2>

        <p>
            Deseja realmente excluir o prontuário de
            <strong>{{ object.consulta.paciente }}</strong>?
        </p>

        <form method="POST">

            {% csrf_token %}

            <button class="btn btn-danger">
                Confirmar Exclusão
            </button>

            <a
                href="{% url 'listar_prontuarios' %}"
                class="btn btn-secondary"
            >
                Cancelar
            </a>

        </form>

    </div>

</div>

{% endblock %}
