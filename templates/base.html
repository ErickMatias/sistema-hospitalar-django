<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Sistema Hospitalar

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

        <div class="container">

            <a
                class="navbar-brand"
                href="{% url 'listar_pacientes' %}"
            >

                Sistema Hospitalar

            </a>

            <div class="collapse navbar-collapse">

                {% if user.is_authenticated %}

                    <ul class="navbar-nav me-auto">

                        <li class="nav-item">

                            <a
                                class="nav-link"
                                href="{% url 'listar_pacientes' %}"
                            >

                                Pacientes

                            </a>

                        </li>

                    </ul>

                    <div class="d-flex align-items-center gap-3">

                        <span class="text-white">

                            Olá, {{ user.username }}

                        </span>

                        <form
                            method="POST"
                            action="{% url 'logout' %}"
                        >

                            {% csrf_token %}

                            <button class="btn btn-danger btn-sm">

                                Sair

                            </button>

                        </form>

                    </div>

                {% else %}

                    <a
                        href="{% url 'login' %}"
                        class="btn btn-light"
                    >

                        Login

                    </a>

                {% endif %}

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
