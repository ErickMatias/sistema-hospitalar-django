{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Nova Consulta</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Salvar
                </button>

                <a href="{% url 'listar_consultas' %}" class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
