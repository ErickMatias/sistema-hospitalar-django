{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4">

    <h1 class="mb-4">
        Detalhes do Paciente
    </h1>

    <p>
        <strong>Nome:</strong>

        {{ paciente.nome }}
    </p>

    <p>
        <strong>CPF:</strong>

        {{ paciente.cpf }}
    </p>

    <p>
        <strong>Telefone:</strong>

        {{ paciente.telefone }}
    </p>

    <p>
        <strong>Data de nascimento:</strong>

        {{ paciente.data_nascimento }}
    </p>

</div>

{% endblock %}
