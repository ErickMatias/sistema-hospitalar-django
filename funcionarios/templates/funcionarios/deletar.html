{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2 class="text-danger">

            Confirmar exclusão

        </h2>

        <p class="mt-3">

            Deseja realmente excluir:

            <strong>

                {{ object.nome }}

            </strong>?

        </p>

        <form method="POST">

            {% csrf_token %}

            <button class="btn btn-danger">

                Confirmar Exclusão

            </button>

            <a
                href="{% url 'listar_funcionarios' %}"
                class="btn btn-secondary"
            >

                Cancelar

            </a>

        </form>

    </div>

</div>

{% endblock %}
